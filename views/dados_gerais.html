<div class="view-content animate-in">
    <div class="view-header">
        <h2>Memorial Descritivo</h2>
        <p>Visão geral do sistema e identificação do titular.</p>
    </div>

    <!-- Estrutura de Dossiê para Identidade -->
    <div class="apresentacao-dossie">
        <div class="dossie-bloco">
            <label><i class="fas fa-user-tie"></i> Titular do Projeto</label>
            <span class="valor" data-field="cliente_nome">---</span>
        </div>
        <div class="dossie-bloco">
            <label><i class="fas fa-fingerprint"></i> Identificação Técnica</label>
            <span class="valor" style="font-family: monospace; font-size: 1rem;" data-field="id">---</span>
        </div>
    </div>

    <div class="grid-dados">
        <div class="campo-info">
            <div class="campo-header">
                <i class="fas fa-bolt" style="color: var(--detalhe);"></i>
                <label>Capacidade Instalada</label>
            </div>
            <span data-field="potencia_kwp">---</span>
        </div>

        <div class="campo-info">
            <div class="campo-header">
                <i class="fas fa-chart-line" style="color: var(--detalhe);"></i>
                <label>Geração Mensal Estimada</label>
            </div>
            <span data-field="geracao_mensal">---</span>
        </div>

        <div class="campo-info">
            <div class="campo-header">
                <i id="icone-telhado" class="fas fa-house-chimney" style="color: var(--detalhe);"></i>
                <label>Padrão de Fixação</label>
            </div>
            <span data-field="tipo_telhado">---</span>
        </div>
    </div>

    <div class="validade-nota" style="margin-top: 20px;">
        <i class="fas fa-microchip"></i> <strong>Nota de Engenharia:</strong> Dimensionamento otimizado com base na irradiação solar local e normas NBR 5410 / 16274.
    </div>
</div>
